<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stofftransport durch die Biomembran</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="intro-screen" class="intro-screen" aria-hidden="true">
    <div class="intro-card">
      <div class="intro-visual" aria-hidden="true">
        <span class="intro-particle particle-1"></span>
        <span class="intro-particle particle-2"></span>
        <span class="intro-particle particle-3"></span>
        <div class="intro-membrane">
          <span class="mem-head top" style="left: 10%;"></span>
          <span class="mem-head top" style="left: 26%;"></span>
          <span class="mem-head top" style="left: 42%;"></span>
          <span class="mem-head top" style="left: 58%;"></span>
          <span class="mem-head top" style="left: 74%;"></span>
          <span class="mem-head top" style="left: 90%;"></span>
          <span class="mem-head bottom" style="left: 10%;"></span>
          <span class="mem-head bottom" style="left: 26%;"></span>
          <span class="mem-head bottom" style="left: 42%;"></span>
          <span class="mem-head bottom" style="left: 58%;"></span>
          <span class="mem-head bottom" style="left: 74%;"></span>
          <span class="mem-head bottom" style="left: 90%;"></span>
        </div>
      </div>
      <h2>BioMembrane Explorer</h2>
      <p>Stofftransport durch die Biomembran verstehen</p>
    </div>
  </div>

  <div id="main-app" class="app-shell app-hidden">
    <aside class="sidebar">
      <div class="brand">
        <h1>Stofftransport durch die Biomembran</h1>
      </div>
      <nav id="nav" class="nav" aria-label="Kapitel"></nav>
      <p class="sidebar-signoff">Von: Abdullah Hamzawi</p>
    </aside>

    <main class="content-panel">
      <section id="content-card" class="content-card" aria-live="polite"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
